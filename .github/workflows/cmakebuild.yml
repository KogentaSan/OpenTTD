name: Build Language Files 2

on:
  workflow_dispatch:

jobs:
  build-lang:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential dos2unix \
            libsdl2-dev zlib1g-dev libpng-dev libfreetype6-dev \
            liblzma-dev liblzo2-dev libcurl4-openssl-dev libicu-dev \
            libfluidsynth-dev libharfbuzz-dev libopusfile-dev libogg-dev libopus-dev

      - name: Build strgen only
        run: |
          cmake -B build -S .
          cmake --build build --target strgen

      - name: Fix file encoding
        run: |
          # 確保所有 txt 都係乾淨嘅 Unix 格式
          find src/lang -name "*.txt" -exec dos2unix {} +
          find src/lang -name "*.txt" -exec sed -i '1s/^\xef\xbb\xbf//' {} +

      - name: Generate .lng files
        run: |
          # 1. 準備工具路徑 (使用絕對路徑最穩陣)
          STRGEN=$(pwd)/build/src/strgen/strgen
          
          # 2. 建立輸出目錄
          mkdir -p output
          OUT_DIR=$(pwd)/output
          
          # 3. 進入語言檔目錄執行
          # 注意順序：strgen <input_txt> <output_lng>
          cd src/lang
          $STRGEN english.txt $OUT_DIR/english.lng
          $STRGEN cantonese.txt $OUT_DIR/cantonese.lng
          $STRGEN traditional_chinese.txt $OUT_DIR/traditional_chinese.lng

      - name: List generated files
        run: ls -l output/

      - name: Upload language artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yue-lang-files
          path: output/
