name: Build Cantonese Language File 2

on:
  workflow_dispatch:   # 手動觸發

jobs:
  build-lang:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Download strgen binary
        run: |
          curl -L https://proxy.openttd.org/strgen/latest/strgen-linux-x64 -o strgen
          chmod +x strgen

      - name: Generate .lng files
        run: |
          mkdir output
          ./strgen src/lang/cantonese.txt -o output/cantonese.lng
          ./strgen src/lang/traditional_chinese.txt -o output/traditional_chinese.lng

      - name: Upload language artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yue-lang-files
          path: output/
