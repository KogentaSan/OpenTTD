name: Build Language Files 2

on:
  workflow_dispatch:

jobs:
  build-lang:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Install minimal dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential dos2unix libicu-dev zlib1g-dev

      - name: Build strgen only
        run: |
          # 關鍵：加入 -DOPTIONAL_DEDICATED=ON 嚟跳過 SDL2 檢查
          # 或者直接用 -DOPTION_DEDICATED=ON
          cmake -B build -S . -DOPTION_DEDICATED=ON
          cmake --build build --target strgen

      - name: Fix file encoding
        run: |
          find src/lang -name "*.txt" -exec dos2unix {} +
          find src/lang -name "*.txt" -exec sed -i '1s/^\xef\xbb\xbf//' {} +

      - name: Generate .lng files
        run: |
          STRGEN=$(pwd)/build/src/strgen/strgen
          mkdir -p output
          OUT_DIR=$(pwd)/output
          
          cd src/lang
          
          # 根據 OpenTTD 源碼，strgen 嘅標準用法係：
          # strgen [選項] [輸出檔案] [輸入檔案]
          # 如果之前順序報錯，我哋試返最原始嘅：
          $STRGEN $OUT_DIR/english.lng english.txt
          $STRGEN $OUT_DIR/cantonese.lng cantonese.txt
          $STRGEN $OUT_DIR/traditional_chinese.lng traditional_chinese.txt

      - name: List generated files
        run: ls -l output/

      - name: Upload language artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yue-lang-files
          path: output/
