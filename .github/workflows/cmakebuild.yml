name: Build Language Files 2

on:
  workflow_dispatch:

jobs:
  build-lang:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential \
            libsdl2-dev zlib1g-dev libpng-dev libfreetype6-dev \
            liblzma-dev liblzo2-dev libcurl4-openssl-dev libicu-dev \
            libfluidsynth-dev libharfbuzz-dev libopusfile-dev libogg-dev libopus-dev

      - name: Build strgen only
        run: |
          cmake -B build -S .
          cmake --build build --target strgen

      - name: Generate .lng files
        run: |
          mkdir output
          build/src/strgen/strgen src/lang/cantonese.txt -o output/cantonese.lng
          build/src/strgen/strgen src/lang/traditional_chinese.txt -o output/traditional_chinese.lng

      - name: Upload language artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yue-lang-files
          path: output/
