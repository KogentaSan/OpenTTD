name: Build Language Files 2

on:
  workflow_dispatch:

jobs:
  build-lang:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential dos2unix \
            libsdl2-dev zlib1g-dev libpng-dev libfreetype6-dev \
            liblzma-dev liblzo2-dev libcurl4-openssl-dev libicu-dev \
            libfluidsynth-dev libharfbuzz-dev libopusfile-dev libogg-dev libopus-dev

      - name: Build strgen only
        run: |
          cmake -B build -S .
          cmake --build build --target strgen

      - name: Fix file encoding and line endings
        run: |
          # 1. 強制轉換為 LF 換行符號
          dos2unix src/lang/*.txt
          # 2. 移除 UTF-8 BOM (如果存在)
          sed -i '1s/^\xef\xbb\xbf//' src/lang/*.txt
          # 3. 確保檔案最後有一行空行 (有助於某些 parser 讀取)
          for f in src/lang/*.txt; do echo "" >> "$f"; done

      - name: Check language file headers (Debug)
        run: |
          echo "=== Checking headers for potential hidden characters ==="
          head -n 3 src/lang/english.txt | cat -A
          head -n 3 src/lang/cantonese.txt | cat -A

      - name: Generate .lng files
        run: |
          # 建立輸出目錄
          mkdir -p output
          
          # 直接用絕對/相對路徑執行，避免 cd 造成路徑混亂
          ./build/src/strgen/strgen src/lang/english.txt output/english.lng
          ./build/src/strgen/strgen src/lang/cantonese.txt output/cantonese.lng
          ./build/src/strgen/strgen src/lang/traditional_chinese.txt output/traditional_chinese.lng

      - name: List generated files
        run: ls -l output/

      - name: Upload language artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yue-lang-files
          path: output/
