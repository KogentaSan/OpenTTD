name: Build Language Files 2

on:
  workflow_dispatch:

jobs:
  build-lang:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential \
            libsdl2-dev zlib1g-dev libpng-dev libfreetype6-dev \
            liblzma-dev liblzo2-dev libcurl4-openssl-dev libicu-dev \
            libfluidsynth-dev libharfbuzz-dev libopusfile-dev libogg-dev libopus-dev

      - name: Build strgen only
        run: |
          cmake -B build -S .
          cmake --build build --target strgen

      - name: Check language file headers
        run: |
          echo "=== english.txt head ==="
          head -n 3 src/lang/english.txt
          echo "=== cantonese.txt head ==="
          head -n 3 src/lang/cantonese.txt
          echo "=== traditional_chinese.txt head ==="
          head -n 3 src/lang/traditional_chinese.txt

-     - name: Generate .lng files
          run: |
          mkdir -p output
          # 使用 sed 移除可能存在嘅 Windows BOM 同埋確保換行符正確
          sed -i '1s/^\xef\xbb\xbf//' src/lang/*.txt
          
          # 執行 strgen
          ./build/src/strgen/strgen src/lang/english.txt output/english.lng
          ./build/src/strgen/strgen src/lang/cantonese.txt output/cantonese.lng
          ./build/src/strgen/strgen src/lang/traditional_chinese.txt output/traditional_chinese.lng

      - name: List generated files
        run: ls -l output/

      - name: Upload language artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yue-lang-files
          path: output/
