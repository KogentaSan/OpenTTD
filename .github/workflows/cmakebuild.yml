name: Build Language Files 2

on:
  workflow_dispatch:

jobs:
  build-lang:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Install minimal dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential dos2unix libicu-dev zlib1g-dev

      - name: Build strgen only
        run: |
          # 使用 Dedicated 模式跳過 SDL2 檢查
          cmake -B build -S . -DOPTION_DEDICATED=ON
          cmake --build build --target strgen

      - name: Fix file encoding
        run: |
          find src/lang -name "*.txt" -exec dos2unix {} +
          find src/lang -name "*.txt" -exec sed -i '1s/^\xef\xbb\xbf//' {} +

      - name: Generate .lng files
        run: |
          STRGEN=$(pwd)/build/src/strgen/strgen
          mkdir -p output
          OUT_DIR=$(pwd)/output
          
          # 睇睇個 help 確定用法 (Debug 用)
          $STRGEN --help || true
          
          cd src/lang
          
          # 根據報錯邏輯，正確順序應該係：strgen [來源.txt] [目標.lng]
          # 唔好寫 output/english.lng，直接試吓寫返入去當前目錄，再 move 走佢 (最穩陣)
          
          $STRGEN english.txt english.lng
          $STRGEN cantonese.txt cantonese.lng
          $STRGEN traditional_chinese.txt traditional_chinese.lng
          
          # 將產生的 .lng 搬去 output
          mv *.lng $OUT_DIR/

      - name: List generated files
        run: ls -l output/

      - name: Upload language artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yue-lang-files
          path: output/
