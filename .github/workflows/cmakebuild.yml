name: Build Language Files 2

on:
  workflow_dispatch:

jobs:
  build-lang:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential dos2unix \
            libsdl2-dev zlib1g-dev libpng-dev libfreetype6-dev \
            liblzma-dev liblzo2-dev libcurl4-openssl-dev libicu-dev \
            libfluidsynth-dev libharfbuzz-dev libopusfile-dev libogg-dev libopus-dev

      - name: Build strgen only
        run: |
          cmake -B build -S .
          cmake --build build --target strgen

      - name: Fix file encoding and line endings
        run: |
          # 徹底清理所有語言檔，確保絕對純淨
          find src/lang -name "*.txt" -exec dos2unix {} +
          find src/lang -name "*.txt" -exec sed -i '1s/^\xef\xbb\xbf//' {} +

      - name: Generate .lng files
        run: |
          mkdir -p output
          
          # 關鍵：strgen 通常嘅用法係 strgen -p [output_dir] [input_file]
          # 或者直接喺 src/lang 目錄行 strgen，等佢自己搵 english.txt
          
          STRGEN=$(pwd)/build/src/strgen/strgen
          OUT_DIR=$(pwd)/output
          
          cd src/lang
          
          # 嘗試方式 A: 明確指定輸出目錄 (-o)
          # 注意：有啲版本嘅 strgen 需要 -o 嚟指定輸出地方
          $STRGEN -o $OUT_DIR english.txt
          $STRGEN -o $OUT_DIR cantonese.txt
          $STRGEN -o $OUT_DIR traditional_chinese.txt
          
          # 如果上面報錯 "invalid option -o"，請將上面三行換成下面呢款：
          # $STRGEN $OUT_DIR/english.lng english.txt
          # $STRGEN $OUT_DIR/cantonese.lng cantonese.txt
          # $STRGEN $OUT_DIR/traditional_chinese.lng traditional_chinese.txt

      - name: List generated files
        run: ls -l output/

      - name: Upload language artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yue-lang-files
          path: output/
