name: Build Language Files 2

on:
  workflow_dispatch:

jobs:
  build-lang:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential dos2unix

      - name: Build strgen
        run: |
          cmake -B build -S .
          cmake --build build --target strgen

      - name: Fix file encoding
        run: |
          find src/lang -name "*.txt" -exec dos2unix {} +
          find src/lang -name "*.txt" -exec sed -i '1s/^\xef\xbb\xbf//' {} +

      - name: Generate .lng files
        run: |
          # 1. 取得 strgen 嘅絕對路徑
          STRGEN=$(pwd)/build/src/strgen/strgen
          
          # 2. 建立一個乾淨嘅目錄嚟擺結果
          mkdir -p output
          OUT_DIR=$(pwd)/output
          
          # 3. 進入語言檔目錄
          cd src/lang
          
          # 4. 使用 strgen 嘅「目錄輸出」模式
          # 語法：strgen -m [目的目錄] [來源檔案]
          # 如果唔得，就試 strgen -o [目的目錄] [來源檔案]
          $STRGEN -m $OUT_DIR english.txt
          $STRGEN -m $OUT_DIR cantonese.txt
          $STRGEN -m $OUT_DIR traditional_chinese.txt

      - name: List generated files
        run: ls -l output/

      - name: Upload language artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yue-lang-files
          path: output/
