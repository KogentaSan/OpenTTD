name: Build Cantonese Language File

on:
  workflow_dispatch:   # 手動觸發

jobs:
  build-lang:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Build strgen
        run: |
          cmake -B build -S .
          cmake --build build --target strgen

      - name: Generate Cantonese .lng
        run: |
          mkdir output
          ./build/strgen src/lang/cantonese.txt -o output/cantonese.lng
          ./build/strgen src/lang/traditional_chinese.txt -o output/traditional_chinese.lng

      - name: Upload language artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yue-lang-files
          path: output/
