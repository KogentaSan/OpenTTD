name: Build Language Files 2

on:
  workflow_dispatch:

jobs:
  build-lang:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential \
            libsdl2-dev zlib1g-dev libpng-dev libfreetype6-dev \
            liblzma-dev liblzo2-dev libcurl4-openssl-dev libicu-dev \
            libfluidsynth-dev libharfbuzz-dev libopusfile-dev libogg-dev libopus-dev

      - name: Build strgen only
        run: |
          cmake -B build -S .
          cmake --build build --target strgen

      - name: Find all english.txt files
        run: |
          echo "=== Searching for english.txt ==="
          find . -name "english.txt" -print
          echo "=== Preview each english.txt ==="
          for f in $(find . -name "english.txt"); do
            echo "--- $f ---"
            head -n 3 $f
          done

      - name: Generate .lng files
        run: |
          mkdir output
          # 強制用 src/lang 下面嗰個 english.txt
          build/src/strgen/strgen ./src/lang/english.txt ./output/english.lng
          build/src/strgen/strgen ./src/lang/cantonese.txt ./output/cantonese.lng
          build/src/strgen/strgen ./src/lang/traditional_chinese.txt ./output/traditional_chinese.lng

      - name: List generated files
        run: ls -l output/

      - name: Upload language artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yue-lang-files
          path: output/
