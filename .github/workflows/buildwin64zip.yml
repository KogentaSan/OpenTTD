name: Build Windows x64 Zip

on:
  workflow_dispatch:   # 只手動觸發

jobs:
  build-windows-x64:
    runs-on: windows-latest
    name: Windows x64 Build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v1.3

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat

      - name: Install dependencies via vcpkg
        run: |
          .\vcpkg\vcpkg.exe install sdl2:x64-windows liblzma:x64-windows libpng:x64-windows lzo:x64-windows zlib:x64-windows breakpad:x64-windows

      - name: Configure build (CMake)
        run: cmake -A x64 -DCMAKE_BUILD_TYPE=Release -B build -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake

      - name: Build project
        run: cmake --build build --config Release

      - name: Install build
        run: cmake --install build --config Release --prefix install

      - name: Copy required DLLs
        shell: pwsh
        run: |
          $deps = @(
            "SDL2.dll",
            "liblzma.dll",
            "libpng16.dll",
            "lzo2.dll",
            "zlib1.dll"
          )

          foreach ($dll in $deps) {
            $path = "${{ github.workspace }}\vcpkg\installed\x64-windows\bin\$dll"
            if (Test-Path $path) {
              Copy-Item $path install/ -Force
            } else {
              Write-Error "Missing dependency: $dll"
            }
          }

      - name: Package zip with datetime + commit hash
        shell: pwsh
        run: |
          $timestamp = Get-Date -Format "yyyyMMddHHmmss"
          $commit = "${{ github.sha }}".Substring(0,7)
          $filename = "yueottd$timestamp-$commit.zip"
          Compress-Archive -Path install/* -DestinationPath $filename
          echo "ZIP_FILE=$filename" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-build
          path: ${{ env.ZIP_FILE }}
