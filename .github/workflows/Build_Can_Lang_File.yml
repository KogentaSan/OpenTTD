name: Build Cantonese Language File

on:
  workflow_dispatch:   # 手動觸發

jobs:
  build-lang:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Build Cantonese .lng file
        run: |
          mkdir output
          # 用 strgen 編譯 cantonese.txt
          ./strgen src/lang/cantonese.txt -o output/cantonese.lng
          # 如果要繁中檔
          ./strgen src/lang/traditional_chinese.txt -o output/traditional_chinese.lng

      - name: Upload language artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yue-lang-files
          path: output/
