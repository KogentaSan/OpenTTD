name: Build Full OpenTTD 16.0 Game Suite

on:
  workflow_dispatch:

jobs:
  build-win64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Build Tools (Cross-Compiler)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++-mingw-w64-x86-64 dos2unix

      - name: Register Cantonese in CMakeLists.txt
        run: |
          # 確保 CMake 知道要處理粵語翻譯檔
          sed -i '/traditional_chinese.txt/a \    cantonese.txt' src/lang/CMakeLists.txt

      - name: Fix file encoding
        run: |
          find src/lang -name "*.txt" -exec dos2unix {} +
          find src/lang -name "*.txt" -exec sed -i '1s/^\xef\xbb\xbf//' {} +

      - name: Configure CMake for Windows
        run: |
          # 配置交叉編譯，並指定安裝路徑為 ./install_dir
          cmake -B build -S . \
            -DCMAKE_TOOLCHAIN_FILE=find_package/toolchains/mingw_x86_64.cmake \
            -DOPTION_DEDICATED=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$(pwd)/install_dir

      - name: Build and Install
        run: |
          # 編譯遊戲本體及所有組件
          cmake --build build -j $(nproc)
          # 執行 install 動作，這會自動建立 ai, baseset, lang 等資料夾並放入正確檔案
          cmake --install build

      - name: Finalizing Package
        run: |
          # 進入安裝目錄
          cd install_dir
          # 確保所有基礎資源夾都齊全 (從 bin 複製漏掉的項目)
          cp -r ../bin/ai . || true
          cp -r ../bin/baseset . || true
          cp -r ../bin/scripts . || true
          cp -r ../bin/game . || true
          # 整理目錄結構，確保 openttd.exe 同各資料夾喺埋一齊
          ls -R

      - name: Upload Full Game Package
        uses: actions/upload-artifact@v4
        with:
          name: OpenTTD-16.0-Full-Win64-Yue
          path: install_dir/
