name: Build OpenTTD 16.0 Zip Package (Windows)

on:
  workflow_dispatch:

jobs:
  build-win64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++-mingw-w64-x86-64 dos2unix ninja-build zip

      - name: Configure CMake for Windows
        run: |
          # 修正 Toolchain 路徑
          cmake -G Ninja -B build -S . \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/mingw_x86_64.cmake \
            -DOPTION_DEDICATED=OFF \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build OpenTTD
        run: |
          # 編譯遊戲本體。編譯完後，所有嘢會自動聚集喺 bin/ 目錄
          cmake --build build -j $(nproc)

      - name: Prepare Files for Zip
        run: |
          # 1. 建立一個乾淨嘅目錄嚟準備 Zip 內容
          mkdir openttd_yue_package
          
          # 2. 將編譯好嘅執行檔同語言檔複製過嚟
          # 喺編譯完後，成品通常喺 build/ 目錄入面嘅 bin 資料夾
          cp -r build/bin/* openttd_yue_package/ || cp -r bin/* openttd_yue_package/ || true
          
          # 3. 確保剛剛編譯好嘅 .exe 喺入面 (MinGW 編譯路徑可能有所不同)
          cp build/openttd.exe openttd_yue_package/ || true
          
          # 4. 確保語言檔已經喺入面
          mkdir -p openttd_yue_package/lang
          cp build/src/lang/*.lng openttd_yue_package/lang/ || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenTTD-16.0-Win64-Yue-Zip
          # 呢度會直接將資料夾內容上傳，你下載嗰陣 GitHub 會自動幫你變做 Zip
          path: openttd_yue_package/
